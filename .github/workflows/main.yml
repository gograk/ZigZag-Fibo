name: Build ZIGZAG_FIBO APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # bisa trigger manual dari GitHub

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install sistem dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev build-essential \
            ccache

      - name: Cache buildozer & Android SDK/NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Install buildozer + Cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==3.0.12

      - name: Build APK
        run: |
          buildozer android debug
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK sebagai artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZIGZAG_FIBO-APK
          path: bin/*.apk
          retention-days: 30

