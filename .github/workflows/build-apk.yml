name: Build ZIGZAG_FIBO APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install sistem dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev build-essential \
            ccache

      - name: Setup Android SDK (gunakan yang sudah ada di runner)
        run: |
          # GitHub Actions sudah punya Android SDK di sini
          PREINSTALLED_SDK=/usr/local/lib/android/sdk
          echo "ANDROID_SDK_ROOT=$PREINSTALLED_SDK" >> $GITHUB_ENV

          # Install build-tools;34.0.0 yang mengandung aidl
          yes | $PREINSTALLED_SDK/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;34.0.0" \
            "platforms;android-33" 2>/dev/null || true

          # Buildozer expects SDK di ~/.buildozer/android/platform/android-sdk
          mkdir -p ~/.buildozer/android/platform
          ln -sf $PREINSTALLED_SDK ~/.buildozer/android/platform/android-sdk

          # Verifikasi aidl ada
          ls $PREINSTALLED_SDK/build-tools/34.0.0/aidl || \
            ls $PREINSTALLED_SDK/build-tools/*/aidl | head -1

      - name: Cache buildozer NDK & packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform/android-ndk*
            ~/.buildozer/packages
            ~/.gradle
          key: buildozer-ndk-${{ runner.os }}-v3-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-ndk-${{ runner.os }}-v3-

      - name: Install buildozer + Cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==3.0.12

      - name: Build APK
        run: |
          buildozer android debug
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZIGZAG_FIBO-APK
          path: bin/*.apk
          retention-days: 30
