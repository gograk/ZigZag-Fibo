name: Build ZIGZAG_FIBO APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install sistem dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev build-essential \
            ccache

      - name: Patch Android SDK untuk buildozer
        run: |
          SDK=/usr/local/lib/android/sdk
          NEW_SDKMANAGER="$SDK/cmdline-tools/latest/bin/sdkmanager"

          # Install build-tools (mengandung aidl) dan platform android-33
          yes | "$NEW_SDKMANAGER" "build-tools;34.0.0" "platforms;android-33" 2>/dev/null || true

          # Buildozer hardcode cari sdkmanager di tools/bin/ (path lama)
          # Buat wrapper shell script di path lama (tanpa heredoc agar tidak masalah indentasi YAML)
          sudo mkdir -p "$SDK/tools/bin"
          printf '#!/bin/bash\nexec /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "$@"\n' \
            | sudo tee "$SDK/tools/bin/sdkmanager" > /dev/null
          sudo chmod +x "$SDK/tools/bin/sdkmanager"

          # Verifikasi wrapper bekerja
          "$SDK/tools/bin/sdkmanager" --version

          # Symlink supaya buildozer menemukan SDK di path defaultnya
          mkdir -p ~/.buildozer/android/platform
          ln -sf "$SDK" ~/.buildozer/android/platform/android-sdk

          # Export
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
          echo "ANDROID_HOME=$SDK"     >> $GITHUB_ENV

      - name: Cache buildozer NDK & packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform/android-ndk*
            ~/.buildozer/packages
            ~/.gradle
          key: buildozer-ndk-${{ runner.os }}-v5-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-ndk-${{ runner.os }}-v5-

      - name: Install buildozer + Cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==3.0.12

      - name: Build APK
        run: buildozer android debug
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZIGZAG_FIBO-APK
          path: bin/*.apk
          retention-days: 30
